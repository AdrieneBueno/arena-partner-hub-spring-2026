# Netlify configuration for the Arena Community Partner Hub
# Static site — no build step required.

[build]
  publish = "."

# Cache static assets (images, SVGs, zip) aggressively — they have content-hashed
# style filenames in our case, but Netlify will revalidate via etag.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, must-revalidate"

[[headers]]
  for = "/graphics-pack/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, must-revalidate"

[[headers]]
  for = "/graphics-thumbs/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, must-revalidate"

[[headers]]
  for = "/*.zip"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# HTML should always revalidate so partners see edits immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Don't index the partner hub on search engines (it's link-shared, not public discovery)
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
